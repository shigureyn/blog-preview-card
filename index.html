<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/style.css">
  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>
  <main class="main">
    <article class="blog-card">
      <img src="images/illustration-article.svg" alt="blog image" class="blog-card__image">
      <span class="blog-card__badge">Learning</span>
      <time class="blog-card__date" datetime="2023-12-21">
        Published 21 Dec 2023
      </time>
      <h1 class="blog-card__title">HTML & CSS foundations</h1>
      <p class="blog-card__text">
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>
      <div class="blog-card__author">
        <img src="images/image-avatar.webp" alt="" class="blog-card__author-image">
        <p class="blog-card__author-name">Greg Hooper</p>
      </div>
    </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/shigureyn">shigureyn</a>.
  </footer>
</body>

</html>
